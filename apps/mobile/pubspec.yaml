name: pip_mobile
description: >
  Personal Intelligence Platform — app Flutter principale (MVP).
  Architettura Feature First: vedi apps/mobile/README.md.
publish_to: "none"
version: 0.1.0+1

environment:
  sdk: ">=3.4.0 <4.0.0"
  flutter: ">=3.22.0"

dependencies:
  flutter:
    sdk: flutter

  flutter_riverpod: ^2.5.1
  go_router: ^14.2.0
  supabase_flutter: ^2.5.6
  file_picker: ^8.0.0
  crypto: ^3.0.3
  url_launcher: ^6.3.1
  web: ^1.1.0
  fl_chart: ^0.68.0
  speech_to_text: ^7.0.0

  pip_shared:
    path: ../../packages/shared
  pip_domain:
    path: ../../packages/domain
  pip_design_system:
    path: ../../packages/design-system

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0
  # Fake di SpeechToTextPlatform per testare la dettatura vocale (vedi
  # test/support/fake_speech_to_text_platform.dart) senza un canale nativo
  # reale: transitiva di speech_to_text, dichiarata qui perché importata
  # direttamente nei test.
  speech_to_text_platform_interface: ^2.4.0

flutter:
  uses-material-design: true
