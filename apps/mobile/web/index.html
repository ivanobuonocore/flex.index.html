<!DOCTYPE html>
<html>
<head>
  <!--
    If you are serving your web app in a path other than the root, change the
    href value below to reflect the base path you are serving from.

    The path provided below has to start and end with a slash "/" in order for
    it to work correctly.

    For more details:
    * https://developer.mozilla.org/en-US/docs/Web/HTML/Element/base

    This is a placeholder for base href that will be replaced by the value of
    the `--base-href` argument provided to `flutter build`.
  -->
  <base href="$FLUTTER_BASE_HREF">

  <meta charset="UTF-8">
  <meta content="IE=Edge" http-equiv="X-UA-Compatible">
  <meta name="description" content="A new Flutter project.">

  <!-- iOS meta tags & icons -->
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black">
  <meta name="apple-mobile-web-app-title" content="mobile">
  <link rel="apple-touch-icon" href="icons/Icon-192.png">

  <!-- Favicon -->
  <link rel="icon" type="image/png" href="favicon.png"/>

  <title>mobile</title>
  <link rel="manifest" href="manifest.json">

  <!-- Senza questo, la pagina del browser (non le liste scrollabili interne
       a Flutter) può scorrere da sola: quando il cursore di testo si
       riposiziona ad ogni carattere digitato, o quando arriva un nuovo
       messaggio, il browser può decidere di "riportare in vista" l'elemento
       e scorrere l'intera pagina — lo scatto segnalato sia scrivendo sia
       ricevendo risposte. Bloccando html/body a piena altezza senza overflow,
       l'unico scroll possibile resta quello interno alle liste di Flutter. -->
  <style>
    html, body {
      height: 100%;
      margin: 0;
      overflow: hidden;
    }
  </style>
</head>
<body>
  <script src="flutter_bootstrap.js" async></script>
</body>
</html>
