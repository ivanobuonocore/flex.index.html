<!DOCTYPE html>
<html>
<head>
  <!--
    If you are serving your web app in a path other than the root, change the
    href value below to reflect the base path you are serving from.

    The path provided below has to start and end with a slash "/" in order for
    it to work correctly.

    For more details:
    * https://developer.mozilla.org/en-US/docs/Web/HTML/Element/base

    This is a placeholder for base href that will be replaced by the value of
    the `--base-href` argument provided to `flutter build`.
  -->
  <base href="/flex.index.html/">

  <meta charset="UTF-8">
  <meta content="IE=Edge" http-equiv="X-UA-Compatible">
  <meta name="description" content="PIP — il tuo assistente personale: Chat, Bilancio, Appuntamenti, Documenti e Attività in un unico posto.">
  <meta name="theme-color" content="#2563EB">

  <!-- iOS meta tags & icons -->
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black">
  <meta name="apple-mobile-web-app-title" content="PIP">
  <link rel="apple-touch-icon" href="icons/Icon-192.png">

  <!-- Favicon -->
  <link rel="icon" type="image/png" href="favicon.png"/>

  <title>PIP — Personal Intelligence Platform</title>
  <link rel="manifest" href="manifest.json">

  <!-- Senza questo, la pagina del browser (non le liste scrollabili interne
       a Flutter) può scorrere da sola: quando il cursore di testo si
       riposiziona ad ogni carattere digitato, o quando arriva un nuovo
       messaggio, il browser può decidere di "riportare in vista" l'elemento
       e scorrere l'intera pagina — lo scatto segnalato sia scrivendo sia
       ricevendo risposte. Bloccando html/body a piena altezza senza overflow,
       l'unico scroll possibile resta quello interno alle liste di Flutter. -->
  <style>
    html, body {
      height: 100%;
      margin: 0;
      overflow: hidden;
      /* Stesso sfondo dello splash sotto: se lo splash sparisce prima che
         Flutter dipinga il primo fotogramma (rete lenta), il browser mostra
         comunque il gradiente invece di un lampo bianco. */
      background: linear-gradient(135deg, #2563EB 0%, #7C3AED 100%);
    }

    /* Splash coerente con l'identità dell'app (richiesta esplicita
       dell'utente: "abbellimenti stilistici") — stesso gradiente
       AppColors.heroGradient già usato in Chat/Bilancio/AppBar, al posto del
       lampo bianco prima che Flutter finisca di caricarsi. Rimosso da
       flutter_bootstrap.js una volta dipinto il primo fotogramma reale
       dell'app (evento standard `flutter-first-frame`, emesso dal motore
       Flutter Web) — mai lasciato a copertura permanente dell'interfaccia. */
    #splash {
      position: fixed;
      inset: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      background: linear-gradient(135deg, #2563EB 0%, #7C3AED 100%);
      z-index: 9999;
      transition: opacity 0.25s ease-out;
    }

    #splash img {
      width: 72px;
      height: 72px;
      border-radius: 20px;
      animation: pip-splash-pulse 1.2s ease-in-out infinite;
    }

    @keyframes pip-splash-pulse {
      0%, 100% { opacity: 0.65; transform: scale(0.94); }
      50% { opacity: 1; transform: scale(1); }
    }
  </style>
</head>
<body>
  <div id="splash"><img src="icons/Icon-192.png" alt=""></div>
  <script>
    window.addEventListener('flutter-first-frame', function () {
      var splash = document.getElementById('splash');
      if (!splash) return;
      splash.style.opacity = '0';
      splash.addEventListener('transitionend', function () { splash.remove(); });
    });
  </script>
  <script src="flutter_bootstrap.js" async></script>
</body>
</html>
